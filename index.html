<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>个人病历与治疗记录</title>
<style>
:root{
  --bg:#f7f9fc;
  --panel:#ffffff;
  --ink:#182230;
  --muted:#667085;
  --subtle:#98a2b3;
  --line:#e4e7ec;
  --soft:#f2f4f7;
  --soft-blue:#eef5ff;
  --brand:#2563eb;
  --brand2:#1d4ed8;
  --teal:#0f766e;
  --red:#b42318;
  --amber:#b54708;
  --green:#067647;
  --shadow:0 1px 2px rgba(16,24,40,.05),0 8px 24px rgba(16,24,40,.06);
}
*{box-sizing:border-box}
html{background:var(--bg)}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.5;font-size:15px;letter-spacing:0}
button,input,textarea,select{font:inherit}
button,.button{border:1px solid transparent;border-radius:8px;background:var(--brand);color:white;padding:9px 14px;cursor:pointer;font-weight:700;box-shadow:0 1px 2px rgba(16,24,40,.06);transition:background .15s ease,border-color .15s ease,box-shadow .15s ease,transform .15s ease}
button:hover,.button:hover{background:var(--brand2);box-shadow:0 4px 12px rgba(37,99,235,.18)}
button:active,.button:active{transform:translateY(1px)}
button.secondary,.button.secondary{background:#fff;color:#344054;border:1px solid var(--line);box-shadow:0 1px 2px rgba(16,24,40,.04)}
button.secondary:hover,.button.secondary:hover{background:#f9fafb;border-color:#cfd5df;color:#182230;box-shadow:0 3px 10px rgba(16,24,40,.08)}
button.text{background:transparent;color:var(--brand);border:0;box-shadow:none;padding:3px 6px;font-size:13px;font-weight:700}
button.text:hover{background:var(--soft-blue);box-shadow:none}
.unlock{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top left,#eaf3ff 0,#f7f9fc 42%,#ffffff 100%)}
.unlock-card{width:min(480px,100%);background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:32px;backdrop-filter:blur(10px)}
.unlock-card h1{margin:0 0 10px;font-size:26px;line-height:1.2;letter-spacing:0;font-weight:800}
.unlock-card p{color:var(--muted);margin:0 0 18px}
.hint{font-size:13px;margin-top:12px!important;color:var(--subtle)!important}
.field{display:block;margin-bottom:12px}
.field span{display:block;font-size:13px;font-weight:800;margin-bottom:6px;color:#344054}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);padding:10px 11px;outline:none;box-shadow:0 1px 2px rgba(16,24,40,.03)}
input:focus,textarea:focus,select:focus{border-color:#84adff;box-shadow:0 0 0 4px rgba(37,99,235,.12)}
textarea{min-height:96px;resize:vertical}
.error{color:var(--red)!important;font-size:14px}
.app{display:grid;grid-template-columns:272px minmax(0,1fr);min-height:100vh}
.side{position:sticky;top:0;height:100vh;background:#fff;color:var(--ink);padding:20px 14px;overflow:auto;border-right:1px solid var(--line)}
.side h1{font-size:19px;margin:0 0 4px;font-weight:850;letter-spacing:0}
.side p{font-size:13px;color:var(--muted);margin:0 0 18px}
.nav{display:grid;gap:4px}
.nav button{text-align:left;background:transparent;color:#475467;border:1px solid transparent;border-radius:8px;padding:10px 11px;box-shadow:none;font-weight:750}
.nav button.active{background:var(--soft-blue);color:#1746ac;border-color:#d7e6ff;box-shadow:none}
.nav button:hover{background:#f8fafc;color:#182230;box-shadow:none}
.main{padding:24px;max-width:1320px;width:100%;margin:0 auto}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}
.top h2{margin:0;font-size:28px;line-height:1.2;font-weight:850;letter-spacing:0}
.top p{margin:6px 0 0;color:var(--muted);max-width:760px}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}
.card{padding:15px 16px;position:relative;overflow:hidden}
.card:before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:linear-gradient(180deg,var(--brand),var(--teal))}
.card .num{font-size:25px;line-height:1.1;font-weight:850;color:#101828}
.card .label{font-size:13px;color:var(--muted);margin-top:4px;font-weight:650}
.panel{padding:18px;margin-bottom:16px}
.panel h3{margin:0 0 14px;font-size:18px;line-height:1.3;font-weight:850;color:#182230}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.kv{display:grid;grid-template-columns:124px 1fr;gap:10px;border-bottom:1px solid var(--soft);padding:10px 0}
.kv:first-child{padding-top:2px}
.kv b{color:#344054;font-size:13px}
.kv span{color:#182230}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;font-size:12px;background:#f2f4f7;color:#344054;margin:3px 4px 0 0;font-weight:700}
.badge.red{background:#fee4e2;color:var(--red)}
.badge.amber{background:#fef0c7;color:var(--amber)}
.badge.green{background:#dcfae6;color:var(--green)}
.timeline{position:relative;display:grid;gap:10px}
.event{display:grid;grid-template-columns:112px 1fr;gap:14px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:13px 14px;box-shadow:0 1px 2px rgba(16,24,40,.03)}
.event .date{font-weight:850;color:#1d4ed8;font-size:13px;white-space:nowrap}
.event h4{margin:0 0 6px;font-size:15px;font-weight:850;color:#182230}
.event p{margin:0 0 8px;color:#475467;white-space:pre-wrap}
.toolbar{display:grid;grid-template-columns:1fr 160px 160px;gap:10px;margin-bottom:0}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff}
.table{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
.table th,.table td{border-bottom:1px solid var(--soft);padding:10px 11px;text-align:left;vertical-align:top}
.table th{color:#344054;background:#f9fafb;position:sticky;top:0;font-size:13px;font-weight:850}
.table tr:last-child td{border-bottom:0}
.table tbody tr:hover{background:#fbfdff}
.abn{color:var(--red);font-weight:850}
.chart{width:100%;height:260px;border:1px solid var(--line);border-radius:8px;background:#fff}
.summary{white-space:pre-wrap;background:#fbfdff;border:1px solid var(--line);border-radius:8px;padding:16px;color:#344054}
.todo-item{display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--soft);padding:10px 0}
.todo-item input{width:auto;margin-top:5px}
.empty{color:var(--muted);background:#f9fafb;border:1px dashed #d0d5dd;border-radius:8px;padding:14px}
.modal-backdrop{position:fixed;inset:0;background:rgba(16,24,40,.48);display:flex;align-items:center;justify-content:center;padding:18px;z-index:20}
.modal{width:min(900px,100%);max-height:92vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 24px 60px rgba(16,24,40,.28)}
.modal-head,.modal-foot{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
.modal-head h3{margin:0;font-size:18px;font-weight:850}
.modal-foot{border-top:1px solid var(--line);border-bottom:0;justify-content:flex-end;background:#f9fafb}
.modal-body{padding:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.wide{grid-column:1/-1}
.toast{position:fixed;right:18px;bottom:18px;background:#182230;color:white;border-radius:8px;padding:12px 14px;box-shadow:var(--shadow);z-index:40}
@media(max-width:980px){.app{grid-template-columns:1fr}.side{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}.nav{grid-template-columns:repeat(2,minmax(0,1fr))}.main{padding:16px}.cards,.grid2,.grid3,.toolbar,.form-grid{grid-template-columns:1fr}.event{grid-template-columns:1fr}.top{flex-direction:column}.actions{justify-content:flex-start}}
@media(max-width:560px){body{font-size:14px}.main{padding:12px}.panel{padding:14px}.nav{grid-template-columns:1fr}.top h2{font-size:23px}.cards{gap:8px}.kv{grid-template-columns:1fr;gap:3px}.actions button{flex:1 1 auto}.event{padding:12px}}
@media print{.side,.actions,.toolbar,button{display:none!important}.app{display:block}.main{max-width:none}.panel,.card{box-shadow:none;break-inside:avoid}}

</style>
</head>

function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function b64(v){const bin=atob(v);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a}
async function decrypt(pw){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(encryptedSeedData.salt),iterations:encryptedSeedData.iterations,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);const enc=b64(encryptedSeedData.data),tag=b64(encryptedSeedData.tag),all=new Uint8Array(enc.length+tag.length);all.set(enc);all.set(tag,enc.length);const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(encryptedSeedData.iv)},key,all);return JSON.parse(new TextDecoder().decode(plain))}
function save(){if(state.profile)localStorage.setItem(STORAGE,JSON.stringify({profile:state.profile,records:state.records}));localStorage.setItem(TODO,JSON.stringify(todos))}
function say(t){state.toast=t;render();setTimeout(()=>{state.toast='';render()},2200)}
function typeLabel(t){return (TYPES.find(x=>x[0]===t)||[])[1]||t}
function text(r){return [r.date,r.type,r.title,r.summary,r.details,r.source,(r.tags||[]).join(' '),(r.metrics||[]).map(m=>m.key+' '+m.value).join(' ')].join(' ')}
function filtered(types=null){const q=state.q.trim().toLowerCase();return state.records.filter(r=>!types||types.includes(r.type)).filter(r=>!state.type||r.type===state.type).filter(r=>!q||text(r).toLowerCase().includes(q)).sort((a,b)=>state.sort==='asc'?a.date.localeCompare(b.date):b.date.localeCompare(a.date))}
function num(v){const m=String(v||'').replace(/[↑↓,]/g,'').match(/-?\d+(\.\d+)?/);return m?Number(m[0]):null}
function metricValue(r,keys){for(const m of r.metrics||[]){if(keys.some(k=>m.key.toLowerCase().includes(k.toLowerCase()))){const n=num(m.value);if(n!=null)return n}}return null}
function latest(type){return state.records.filter(r=>r.type===type).sort((a,b)=>b.date.localeCompare(a.date))[0]}
function unlock(error=''){root.innerHTML='<main class="unlock"><form class="unlock-card" id="unlock"><h1>个人病历与治疗记录</h1><p>病历数据已加密。输入密码后，在本机浏览器中解密查看。</p><label class="field"><span>访问密码</span><input id="pw" type="password" autofocus></label>'+(error?'<p class="error">'+esc(error)+'</p>':'')+'<button>解锁病历</button><p class="hint">解锁后可在线查看、新增、修改、备份。</p></form></main>';document.getElementById('unlock').onsubmit=async e=>{e.preventDefault();const btn=e.target.querySelector('button');btn.disabled=true;btn.textContent='正在解锁...';try{const seed=await decrypt(document.getElementById('pw').value);state.seed=seed;state.profile=seed.profile;state.records=seed.records;save();render()}catch{unlock('密码不正确，或浏览器不支持本地解密。')}}}
function layout(body,title,desc){const counts={all:state.records.length,tx:state.records.filter(r=>['treatment','medication'].includes(r.type)).length,lab:state.records.filter(r=>['lab','marker','imaging'].includes(r.type)).length,event:state.records.filter(r=>['fever'].includes(r.type)||/发热|感染|骨髓|麻木|过敏|腹泻|口腔/.test(text(r))).length};root.innerHTML='<div class="app"><aside class="side"><h1>病历工作台</h1><p>治疗记录管理</p><nav class="nav">'+NAV.map(n=>'<button class="'+(state.tab===n[0]?'active':'')+'" data-nav="'+n[0]+'">'+n[1]+'</button>').join('')+'</nav></aside><main class="main"><header class="top"><div><h2>'+title+'</h2><p>'+desc+'</p></div><div class="actions"><button id="add">新增记录</button><button class="secondary" id="backup">备份数据</button><button class="secondary" id="restore">恢复数据</button><button class="secondary" id="print">打印</button><input id="restoreFile" type="file" accept="application/json" style="display:none"></div></header><section class="cards"><div class="card"><div class="num">'+counts.all+'</div><div class="label">全部记录</div></div><div class="card"><div class="num">'+counts.tx+'</div><div class="label">治疗/用药</div></div><div class="card"><div class="num">'+counts.lab+'</div><div class="label">检查/报告</div></div><div class="card"><div class="num">'+counts.event+'</div><div class="label">不良反应/事件</div></div></section>'+body+'</main></div>'+(state.modal?modal(state.modal):'')+(state.toast?'<div class="toast">'+esc(state.toast)+'</div>':'');bind()}
function overview(){const p=state.profile;const marker=latest('marker'),img=latest('imaging'),visit=latest('visit');layout('<section class="panel"><h3>患者概况</h3><div class="grid2"><div>'+kv('患者',p.name)+kv('诊断/分期',p.diagnosis)+kv('手术/病理',p.surgery)+kv('基因信息',geneInfo(p))+'</div><div>'+kv('当前治疗状态',p.stage)+kv('最近肿标',p.latestMarker)+kv('最近影像',p.latestImaging)+kv('最近门诊',visit?visit.date+' '+visit.title:'未记录')+'</div></div></section><section class="grid3"><div class="panel"><h3>最近肿标</h3>'+(marker?recordMini(marker):'暂无')+'</div><div class="panel"><h3>最近影像</h3>'+(img?recordMini(img):'暂无')+'</div><div class="panel"><h3>近期事件</h3>'+filtered(['fever','visit']).slice(0,3).map(recordMini).join('')+'</div></section>','患者概况','诊断、分期、病理、基因信息与当前治疗状态。')}

function timeline(){const rs=filtered(['treatment','visit','imaging']).filter(r=>/手术|化疗|替吉奥|CT|MRI|PET|复查|门诊|C\d+/.test(text(r))).slice(0,120);layout(toolbar()+ '<section class="panel"><h3>治疗时间线</h3><div class="timeline">'+rs.map(r=>'<article class="event"><div class="date">'+esc(r.date)+'</div><div><h4>'+esc(r.title)+'</h4><p>'+esc(r.summary||r.details||'')+'</p>'+recordActions(r)+badges(r)+'</div></article>').join('')+'</div></section>','治疗时间线','手术、化疗、复查、影像和其他关键治疗节点。')}
function labs(){const rs=filtered(['lab']);const headers=['WBC','NEUT','HGB','PLT','RBC','ALT','AST','GGT','GLU','CRP'];layout(toolbar()+'<section class="panel"><h3>血液检查趋势</h3>'+lineChart(rs,'WBC 白细胞',['wbc','白细胞'])+'</section><section class="panel"><h3>血液检查明细</h3><div class="table-wrap"><table class="table"><thead><tr><th>日期</th>'+headers.map(h=>'<th>'+h+'</th>').join('')+'<th>摘要</th></tr></thead><tbody>'+rs.map(r=>'<tr><td>'+r.date+'</td>'+headers.map(h=>cellMetric(r,h)).join('')+'<td>'+esc(r.summary||'')+'</td></tr>').join('')+'</tbody></table></div></section>','血液检查','按日期查看血常规、肝肾功能等，异常值自动高亮。')}
function cellMetric(r,h){const m=(r.metrics||[]).find(x=>x.key.toLowerCase().includes(h.toLowerCase())||x.key.includes(h));if(!m)return '<td></td>';const ab=/[↑↓]/.test(m.value);return '<td class="'+(ab?'abn':'')+'">'+esc(m.value)+'</td>'}
function markers(){const rs=filtered(['marker']).sort((a,b)=>a.date.localeCompare(b.date));layout('<section class="grid2"><div class="panel"><h3>CA19-9 趋势</h3>'+lineChart(rs,'CA19-9',['CA19-9','CA199'])+'</div><div class="panel"><h3>CEA 趋势</h3>'+lineChart(rs,'CEA',['CEA','癌胚抗原'])+'</div></section><section class="panel"><h3>肿瘤标志物记录</h3><div class="table-wrap"><table class="table"><thead><tr><th>日期</th><th>CA19-9</th><th>CEA</th><th>CA125</th><th>摘要</th></tr></thead><tbody>'+rs.map(r=>'<tr><td>'+r.date+'</td><td>'+metricText(r,['CA19-9','CA199'])+'</td><td>'+metricText(r,['CEA','癌胚抗原'])+'</td><td>'+metricText(r,['CA125'])+'</td><td>'+esc(r.summary)+'</td></tr>').join('')+'</tbody></table></div></section>','肿瘤标志物','CA19-9、CEA 等指标趋势。')}
function metricText(r,keys){const m=(r.metrics||[]).find(x=>keys.some(k=>x.key.includes(k)));return m?esc(m.value):''}
function lineChart(rs,title,keys){const pts=rs.map(r=>({date:r.date,v:metricValue(r,keys)})).filter(x=>x.v!=null);if(pts.length<2)return '<div class="empty">数据不足，暂不能画趋势。</div>';const w=640,h=220,p=34,max=Math.max(...pts.map(x=>x.v)),min=Math.min(...pts.map(x=>x.v));const sx=i=>p+i*(w-2*p)/(pts.length-1);const sy=v=>h-p-(v-min)/(max-min||1)*(h-2*p);const d=pts.map((pt,i)=>(i?'L':'M')+sx(i).toFixed(1)+' '+sy(pt.v).toFixed(1)).join(' ');return '<svg class="chart" viewBox="0 0 '+w+' '+h+'"><text x="20" y="22" font-size="14" font-weight="700">'+esc(title)+'</text><line x1="'+p+'" y1="'+(h-p)+'" x2="'+(w-p)+'" y2="'+(h-p)+'" stroke="#d8dee9"/><line x1="'+p+'" y1="'+p+'" x2="'+p+'" y2="'+(h-p)+'" stroke="#d8dee9"/><path d="'+d+'" fill="none" stroke="#1f5fd6" stroke-width="3"/>'+pts.map((pt,i)=>'<circle cx="'+sx(i).toFixed(1)+'" cy="'+sy(pt.v).toFixed(1)+'" r="3.5" fill="#1f5fd6"><title>'+pt.date+' '+pt.v+'</title></circle>').join('')+'<text x="'+p+'" y="'+(h-8)+'" font-size="11" fill="#667085">'+pts[0].date+'</text><text x="'+(w-p-80)+'" y="'+(h-8)+'" font-size="11" fill="#667085">'+pts.at(-1).date+'</text><text x="'+(p+4)+'" y="'+(p+10)+'" font-size="11" fill="#667085">max '+max+'</text></svg>'}
function imaging(){const rs=filtered(['imaging']).sort((a,b)=>a.date.localeCompare(b.date));layout('<section class="panel"><h3>影像时间对比</h3><div class="timeline">'+rs.map(r=>'<article class="event"><div class="date">'+esc(r.date)+'</div><div><h4>'+esc(r.title)+'</h4><p>'+esc((r.details||r.summary||'').slice(0,650))+'</p>'+recordActions(r)+badges(r)+'</div></article>').join('')+'</div></section>','影像检查','按时间对比病灶描述、检查结论和随访提示。')}
function cycles(){const rs=filtered(['treatment','medication']).filter(r=>/AG|替吉奥|吉西|白紫|化疗|C\d+|减量|停药|用药|左氧/.test(text(r))).slice(0,160);layout(toolbar()+'<section class="panel"><h3>用药与治疗周期</h3><div class="table-wrap"><table class="table"><thead><tr><th>日期</th><th>类型</th><th>周期/方案</th><th>剂量/说明</th><th>来源</th></tr></thead><tbody>'+rs.map(r=>'<tr><td>'+r.date+'</td><td>'+typeLabel(r.type)+'</td><td>'+esc(r.title)+'</td><td>'+esc((r.summary||r.details||'').slice(0,260))+'</td><td>'+esc(r.source||'')+'<br>'+recordActions(r)+'</td></tr>').join('')+'</tbody></table></div></section>','用药与治疗周期','方案、剂量、日期、减量或停药原因。')}
function events(){const rs=filtered(null).filter(r=>r.type==='fever'||/发热|感染|骨髓|升白针|麻木|过敏|腹泻|口腔|CRP|白细胞|中性粒/.test(text(r))).slice(0,160);layout(toolbar()+'<section class="panel"><h3>不良反应与病情事件</h3><div class="timeline">'+rs.map(r=>'<article class="event"><div class="date">'+r.date+'</div><div><h4>'+esc(r.title)+'</h4><p>'+esc(r.summary||r.details||'')+'</p>'+recordActions(r)+badges(r)+'</div></article>').join('')+'</div></section>','不良反应与病情事件','发热、感染、骨髓抑制、麻木、过敏等事件集中查看。')}

function summary(){const p=state.profile;const latestMarker=latest('marker'),latestImg=latest('imaging');const recentEvents=filtered(null).filter(r=>/发热|感染|CRP|门诊|复查|替吉奥|化疗/.test(text(r))).slice(0,8);const txt='【患者】\n'+(p.name||'')+'\n\n【诊断/病理/基因】\n'+(p.diagnosis||'')+'\n'+(p.surgery||'')+'\n'+geneInfo(p)+'\n\n【当前治疗状态】\n'+(p.stage||'')+'\n\n【最近肿瘤标志物】\n'+(p.latestMarker||'')+'\n'+(latestMarker?latestMarker.date+' '+latestMarker.summary:'')+'\n\n【最近影像】\n'+(p.latestImaging||'')+'\n'+(latestImg?latestImg.date+' '+latestImg.title:'')+'\n\n【近期重点事件】\n'+recentEvents.map(r=>'- '+r.date+' '+r.title+'：'+(r.summary||'').slice(0,120)).join('\n')+'\n\n【复诊待问】\n'+(todos.filter(t=>!t.done).map(t=>'- '+(t.date||'未定')+' '+t.text).join('\n')||'暂无');layout('<section class="panel"><h3>一页就医摘要</h3><button id="copySummary">复制摘要</button><div class="summary" id="summaryText">'+esc(txt)+'</div></section>','就医摘要','自动汇总成一页简明病历，复诊时直接查看。')}

function modal(r){return '<div class="modal-backdrop"><form class="modal" id="recForm"><div class="modal-head"><h3>'+(r.id?'修改记录':'新增记录')+'</h3><button type="button" class="secondary" data-close>关闭</button></div><div class="modal-body form-grid"><label class="field"><span>日期</span><input id="mDate" type="date" value="'+esc(r.date||new Date().toISOString().slice(0,10))+'"></label><label class="field"><span>类型</span><select id="mType">'+TYPES.map(t=>'<option value="'+t[0]+'" '+(r.type===t[0]?'selected':'')+'>'+t[1]+'</option>').join('')+'</select></label><label class="field wide"><span>标题</span><input id="mTitle" value="'+esc(r.title||'')+'"></label><label class="field wide"><span>摘要</span><textarea id="mSummary">'+esc(r.summary||'')+'</textarea></label><label class="field wide"><span>详情</span><textarea id="mDetails">'+esc(r.details||'')+'</textarea></label><label class="field"><span>标签</span><input id="mTags" value="'+esc((r.tags||[]).join(', '))+'"></label><label class="field"><span>来源</span><input id="mSource" value="'+esc(r.source||'手动录入')+'"></label></div><div class="modal-foot"><button type="button" class="secondary" data-close>取消</button><button>保存</button></div></form></div>'}
function bind(){document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.nav;render()});const q=document.getElementById('q');if(q)q.oninput=e=>{state.q=e.target.value;render()};const ty=document.getElementById('type');if(ty)ty.onchange=e=>{state.type=e.target.value;render()};const so=document.getElementById('sort');if(so)so.onchange=e=>{state.sort=e.target.value;render()};const add=document.getElementById('add');if(add)add.onclick=()=>{state.modal={id:'',date:new Date().toISOString().slice(0,10),type:'note',title:'',summary:'',details:'',metrics:[],tags:[],source:'手动录入'};render()};const backup=document.getElementById('backup');if(backup)backup.onclick=()=>{const blob=new Blob([JSON.stringify({profile:state.profile,records:state.records,todos},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='病历数据备份-'+new Date().toISOString().slice(0,10)+'.json';a.click();say('备份已生成')};const restore=document.getElementById('restore');const rf=document.getElementById('restoreFile');if(restore&&rf){restore.onclick=()=>rf.click();rf.onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const data=JSON.parse(await file.text());if(!Array.isArray(data.records))throw new Error('bad');state.profile=data.profile||state.profile;state.records=data.records;todos=data.todos||todos;save();say('数据已恢复');}catch{say('备份文件无法读取')}}}const pr=document.getElementById('print');if(pr)pr.onclick=()=>print();document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{const r=state.records.find(x=>x.id===b.dataset.edit);if(r){state.modal={...r};render()}});document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{const r=state.records.find(x=>x.id===b.dataset.del);if(r&&confirm('确认删除这条记录？')){state.records=state.records.filter(x=>x.id!==r.id);save();say('记录已删除')}});document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>{state.modal=null;render()});const f=document.getElementById('recForm');if(f)f.onsubmit=e=>{e.preventDefault();const id=state.modal.id||crypto.randomUUID();const rec={...state.modal,id,date:mDate.value,type:mType.value,title:mTitle.value,summary:mSummary.value,details:mDetails.value,tags:mTags.value.split(/[,，]/).map(x=>x.trim()).filter(Boolean),source:mSource.value};const i=state.records.findIndex(r=>r.id===id);if(i>=0)state.records[i]=rec;else state.records.push(rec);state.modal=null;save();say('记录已保存')};const ta=document.getElementById('todoAdd');if(ta)ta.onclick=()=>{const txt=todoText.value.trim();if(!txt)return;todos.push({text:txt,date:todoDate.value,done:false});save();render()};document.querySelectorAll('[data-todo]').forEach(c=>c.onchange=()=>{todos[Number(c.dataset.todo)].done=c.checked;save();render()});const cp=document.getElementById('copySummary');if(cp)cp.onclick=()=>{navigator.clipboard.writeText(document.getElementById('summaryText').innerText);say('摘要已复制')}}
function render(){if(!state.profile){unlock();return}if(state.tab==='overview')overview();else if(state.tab==='timeline')timeline();else if(state.tab==='labs')labs();else if(state.tab==='markers')markers();else if(state.tab==='imaging')imaging();else if(state.tab==='cycles')cycles();else if(state.tab==='events')events();else if(state.tab==='todos')todosView();else summary()}
try{const saved=JSON.parse(localStorage.getItem(STORAGE)||'null');if(saved){state.profile=saved.profile;state.records=saved.records||[]}todos=JSON.parse(localStorage.getItem(TODO)||'[]')}catch{}
render();
</script></body></html>
