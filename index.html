<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>患者病历整理助手</title>
<style>
:root{--bg:#f6f1eb;--paper:#fffdfa;--panel:#ffffff;--ink:#2c241f;--muted:#77695f;--line:#eadfd4;--soft:#f7efe7;--brand:#9b5038;--brand2:#7d3f2c;--blue:#315f80;--red:#b42318;--amber:#9a5b00;--green:#287a3e;--shadow:0 12px 30px rgba(94,65,45,.10)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#faf6f1,#f3eee8);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;font-size:15px}button,input,select{font:inherit}button{border:0;border-radius:999px;background:var(--brand);color:white;padding:10px 16px;font-weight:750;cursor:pointer}button:hover{background:var(--brand2)}button.secondary{background:#fff;color:var(--brand);border:1px solid #dbc6b8}.unlock{min-height:100vh;display:grid;place-items:center;padding:24px}.unlock-panel{width:min(520px,100%);background:var(--paper);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:34px}.unlock-panel h1{margin:0 0 8px;font-size:30px}.unlock-panel p{margin:0 0 18px;color:var(--muted)}.field span{display:block;font-weight:800;margin-bottom:8px;color:#5b4b42}.field input{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:white}.error{color:var(--red)!important}.app{max-width:1260px;margin:0 auto;padding:28px}.hero{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;background:var(--paper);border:1px solid var(--line);border-radius:28px;padding:30px 32px;box-shadow:var(--shadow)}.eyebrow{margin:0 0 8px;color:var(--brand);font-size:13px;font-weight:850;letter-spacing:.08em;text-transform:uppercase}.hero h1{margin:0;font-size:34px;line-height:1.2}.subtle{color:var(--muted)}.hero .subtle{margin:10px 0 0}.top-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.tabs{position:sticky;top:0;z-index:5;display:flex;gap:8px;overflow:auto;padding:16px 0;background:linear-gradient(180deg,#faf6f1 75%,rgba(250,246,241,0))}.tabs button{background:#fff;color:#6c5c52;border:1px solid var(--line);white-space:nowrap;box-shadow:0 4px 14px rgba(94,65,45,.05)}.tabs button.active{background:var(--brand);color:white;border-color:var(--brand)}.content{margin-top:4px}.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:var(--shadow)}.gap-top{margin-top:18px}.stat-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px}.stat span{display:block;color:var(--muted);font-size:13px;font-weight:800}.stat strong{display:block;margin:10px 0 8px;font-size:22px;line-height:1.25}.stat small{color:var(--muted)}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}.section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px}.section-head h2,.card h2{margin:0 0 8px;font-size:22px}.section-head input,.section-head select{min-width:260px;border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:#fff}.date{color:var(--brand);font-weight:850}.metric-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.metric-row span{background:var(--soft);border-radius:14px;padding:10px}.badge,.pill{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:800;background:#f0e5dc;color:#6d4b3c;margin:2px}.badge.high,.badge.low{background:#fee4e2;color:var(--red)}.badge.normal{background:#dcfae6;color:var(--green)}.notice{background:#fff7e8;border:1px solid #f3d6aa;color:#6d4b00;border-radius:16px;padding:12px;margin:8px 0}.summary{white-space:pre-wrap}.history-track{display:grid;gap:14px}.history-item{display:grid;grid-template-columns:42px 1fr;gap:14px;padding:14px;border:1px solid var(--line);border-radius:18px;background:#fffdfa}.history-dot{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:var(--brand);color:#fff;font-weight:850}.history-item h3,.record h3{margin:4px 0 8px}.list{display:grid;gap:12px}.record{border:1px solid var(--line);border-radius:18px;background:#fffdfa;padding:16px}.record-top{display:flex;justify-content:space-between;gap:12px;align-items:center}.preline{white-space:pre-wrap}.chart-scroll{overflow:auto}.chart{width:100%;min-width:680px;height:280px}.gridline{stroke:#eadfd4;stroke-width:1}.limit{stroke:#c2410c;stroke-dasharray:5 5}.table-wrap{overflow:auto;margin-top:18px;border:1px solid var(--line);border-radius:18px}table{width:100%;border-collapse:collapse;background:white}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}th{background:#fbf7f2;color:#6c5c52}.empty{color:var(--muted);background:#fbf7f2;border:1px dashed var(--line);border-radius:16px;padding:16px}.details-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}details{margin-top:8px}summary{cursor:pointer;color:var(--brand);font-weight:800}.footer{color:var(--muted);text-align:center;margin:26px 0 8px}@media(max-width:900px){.app{padding:14px}.hero{flex-direction:column;padding:22px}.hero h1{font-size:27px}.stat-grid,.two-col,.details-grid,.metric-row{grid-template-columns:1fr}.section-head{flex-direction:column}.section-head input,.section-head select{width:100%;min-width:0}.top-actions{justify-content:flex-start}.chart{min-width:560px}}@media print{.tabs,.top-actions,.unlock button{display:none!important}.app{max-width:none;padding:0}.hero,.card,.record,.history-item{box-shadow:none;break-inside:avoid}body{background:white}}

/* Lynn requested a compact archive view: force all visible text to 10pt. */
html,body,button,input,select,textarea,table,th,td,p,li,summary,details,span,small,b,strong,h1,h2,h3,h4,label,.hero h1,.card h2,.section-head h2,.stat strong,.eyebrow,.subtle,.date,.badge,.pill,.tabs button{font-size:10pt!important;line-height:1.45!important;letter-spacing:0!important}
.app{padding:18px!important;max-width:1180px!important}
.hero{padding:18px 20px!important;border-radius:18px!important}
.tabs{padding:10px 0!important;gap:6px!important}
.tabs button{padding:7px 11px!important}
.card{padding:16px!important;border-radius:16px!important}
.stat-grid{grid-template-columns:repeat(5,minmax(0,1fr))!important;gap:10px!important}
.two-col,.details-grid{gap:12px!important}
.gap-top{margin-top:12px!important}
.stat strong{margin:6px 0 4px!important;font-weight:750!important}
.metric-row{gap:8px!important}.metric-row span{padding:8px!important}
.section-head{margin-bottom:10px!important}.section-head input,.section-head select{padding:7px 9px!important;min-width:220px!important}
.record{padding:12px!important;border-radius:14px!important}.history-item{padding:10px!important;border-radius:14px!important}.history-dot{width:28px!important;height:28px!important;font-size:10pt!important}
.chart{height:220px!important}.table-wrap{margin-top:12px!important}th,td{padding:7px!important}.empty,.notice{padding:10px!important;border-radius:12px!important}
@media(max-width:900px){.app{padding:10px!important}.hero{padding:14px!important}.section-head input,.section-head select{min-width:0!important}}

/* Compact readable archive typography refinements */
.stat strong{font-weight:400!important;white-space:pre-line!important;color:#2c241f!important}
.stat span,.card h2,.section-head h2{font-weight:600!important}
b,strong{font-weight:400!important}

.seg-list{display:grid;gap:1em;margin-top:4px}
.seg-item{position:relative;white-space:pre-wrap;padding-left:1.15em;font-weight:400!important;color:#2c241f!important}
.seg-item:before{content:"•";position:absolute;left:0;top:0;color:#444;font-size:1em;line-height:1.45}

/* Align overview card titles with lower section titles */
.stat span{display:block!important;color:#2c241f!important;font-size:10pt!important;font-weight:600!important;line-height:1.45!important;margin:0 0 8px!important}
.overview-metrics{grid-template-columns:1.18fr .82fr!important}
.lab-card .metric-row{grid-template-columns:repeat(2,minmax(270px,1fr))!important}
.marker-card .metric-row{grid-template-columns:repeat(2,minmax(150px,1fr))!important}
.metric-row span.metric-item{display:flex!important;flex-direction:column!important;min-height:86px!important}
.metric-title{display:block!important;min-height:2.2em!important;font-weight:400!important;border-bottom:1px solid #e5d8cd!important;padding-bottom:6px!important;margin-bottom:8px!important;white-space:nowrap!important}
.metric-value{display:flex!important;align-items:center!important;gap:6px!important;margin-top:auto!important}
.metric-value .badge{padding:3px 9px!important;margin:0!important;display:inline-flex!important;width:auto!important}
@media(max-width:900px){.overview-metrics,.lab-card .metric-row,.marker-card .metric-row{grid-template-columns:1fr!important}.metric-title{white-space:normal!important}}
</style>

let state={profile:null,records:[],tab:'overview',q:'',labMetric:'WBC',markerMetric:'CA19-9'};const root=document.getElementById('root');
function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function b64(v){const bin=atob(v);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a}
async function decrypt(pw){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(encryptedSeedData.salt),iterations:encryptedSeedData.iterations,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);const enc=b64(encryptedSeedData.data),tag=b64(encryptedSeedData.tag),all=new Uint8Array(enc.length+tag.length);all.set(enc);all.set(tag,enc.length);const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(encryptedSeedData.iv)},key,all);return JSON.parse(new TextDecoder().decode(plain))}
function unlock(error=''){root.innerHTML='<main class="unlock"><form class="unlock-panel" id="unlock"><p class="eyebrow">Medical Record Archive</p><h1>患者病历整理助手</h1><p>病历内容已加密。输入密码后，仅在当前浏览器中解密查看。</p><label class="field"><span>访问密码</span><input id="pw" type="password" autofocus></label>'+(error?'<p class="error">'+esc(error)+'</p>':'')+'<button>查看病历档案</button></form></main>';document.getElementById('unlock').onsubmit=async e=>{e.preventDefault();try{const seed=await decrypt(document.getElementById('pw').value);state.profile=seed.profile;state.records=seed.records;render()}catch{unlock('密码不正确，或浏览器不支持本地解密。')}}}
function text(r){return [r.date,r.type,r.title,r.summary,r.details,r.source,(r.tags||[]).join(' '),(r.metrics||[]).map(m=>[m.key,m.cn,m.abbr,m.en,m.value,m.ref,m.unit].filter(Boolean).join(' ')).join(' ')].join(' ')}function rec(types){return state.records.filter(r=>!types||types.includes(r.type)).filter(r=>!state.q||text(r).toLowerCase().includes(state.q.toLowerCase())).sort((a,b)=>a.date.localeCompare(b.date))}function latest(type){return rec([type]).at(-1)}function latestWithMetrics(type){return rec([type]).filter(r=>Array.isArray(r.metrics)&&r.metrics.length>0).at(-1)||latest(type)}function num(v){const m=String(v||'').replace(/[↑↓,]/g,'').match(/-?\d+(\.\d+)?/);return m?Number(m[0]):null}function metric(r,keys){for(const m of r.metrics||[]){const hay=[m.key,m.cn,m.abbr,m.en].filter(Boolean).join(' ').toLowerCase();if(keys.some(k=>hay.includes(k.toLowerCase()))){return {...m,raw:m.value,value:num(m.value)}}}return null}function metricKeys(type){const set=new Set();rec([type]).forEach(r=>(r.metrics||[]).forEach(m=>set.add(m.key)));return [...set]}
function appShell(body){const p=state.profile;root.innerHTML='<main class="app"><header class="hero"><div><p class="eyebrow">本地病历档案 · 仅供个人查看</p><h1>'+esc(p.name||'患者')+'｜病历整理助手</h1><p class="subtle">按时间归档治疗、检查、影像、肿瘤标志物和复诊摘要。当前页面为只读查看版。</p></div><div class="top-actions"><button class="secondary" id="print">打印 / 存 PDF</button><button class="secondary" id="copy">复制就医摘要</button></div></header><nav class="tabs">'+TABS.map(t=>'<button class="'+(state.tab===t[0]?'active':'')+'" data-tab="'+t[0]+'">'+t[1]+'</button>').join('')+'</nav><div class="content">'+body+'</div><p class="footer">本页面仅供个人病历归档与复诊沟通，不替代医生诊断。</p></main>';bind()}
function segmentText(value){const parts=String(value||'-').split(/\n+/).map(x=>x.trim()).filter(Boolean);if(parts.length<2)return '<strong>'+esc(value||'-')+'</strong>';return '<div class="seg-list">'+parts.map(x=>'<div class="seg-item">'+esc(x)+'</div>').join('')+'</div>'}
function stat(title,big,small){return '<article class="card stat"><span>'+title+'</span>'+segmentText(big)+'</article>'}function row(label,value){return '<p><b>'+label+'：</b>'+esc(value||'未记录')+'</p>'}const MARKER_REFS={'CA242':25,'CEA':5.00,'CA19-9':34.00,'CA125':35.00,'CA72-4':9.8};
function markerRefLabel(k){return k+'（≤'+(k==='CEA'?'5.00':k==='CA19-9'?'34.00':k==='CA125'?'35.00':MARKER_REFS[k])+'）'}
function markerCode(k){return Object.keys(MARKER_REFS).find(x=>String(k||'').toLowerCase().includes(x.toLowerCase()))||k}
function markerStatus(k,v){const code=markerCode(k), n=num(v);return Number.isFinite(n)&&MARKER_REFS[code]!=null&&n>MARKER_REFS[code]?'high':''}
function status(v){return /↑|高/.test(v||'')?'high':/↓|低/.test(v||'')?'low':''}
function badge(v,forced){const st=forced||status(v);return st?'<span class="badge '+st+'">'+(st==='high'?'高':'低')+'</span>':''}
function metricName(m,fallback){if(!m)return fallback||'';if(m.cn)return m.cn+(m.ref?'（'+m.ref+'）':'');return m.key||fallback||''}
function metricCard(m,label,forced){return '<span class="metric-item"><b class="metric-title">'+esc(label||metricName(m))+'</b><div class="metric-value">'+esc(m?.raw||'-')+(m?.unit?' '+esc(m.unit):'')+' '+badge(m?.raw,forced||m?.status)+'</div></span>'}
function overview(){const p=state.profile, lab=latest('lab'), mark=latestWithMetrics('marker'), img=latest('imaging');appShell('<section><div class="stat-grid">'+stat('诊断/分期',p.diagnosis,'核心诊断信息')+stat('手术情况及病理诊断',[p.surgery,p.pathology].filter(Boolean).join('\n\n'),'')+stat('免疫组化',p.immunohistochemistry||'未记录','')+stat('基因检测',p.geneticTesting||'未记录','')+stat('当前治疗状态',p.stage||'未记录','')+'</div><div class="two-col overview-metrics gap-top"><article class="card lab-card"><h2>最近一次血检</h2><p class="date">'+esc(lab?.date||'')+'</p><div class="metric-row">'+(lab?.metrics||[]).filter(m=>m.key!=='备注').map(m=>metricCard({...m,raw:m.value})).join('')+'</div></article><article class="card marker-card"><h2>最近一次肿瘤标志物</h2><p class="date">'+esc(mark?.date||'')+'</p><div class="metric-row">'+['CA242','CEA','CA19-9','CA125','CA72-4'].map(k=>{const m=metric(mark||{},[k]);return metricCard(m,markerRefLabel(k),markerStatus(k,m?.raw))}).join('')+'</div></article></div><article class="card gap-top"><h2>最近影像</h2>'+row('日期',img?.date)+row('检查',img?.title)+row('摘要',img?.summary||img?.details)+'</article></section>')}
function history(){const rows=state.records.filter(r=>r.date<='2024-06-15'||/初诊|病理|手术|PET|CT|MR|超声|会诊|穿刺/.test(text(r))).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,80);appShell('<section class="card"><div class="section-head"><div><p class="eyebrow">2024-02 至 2024-06</p><h2>诊疗起始档案</h2><p class="subtle">从发现占位、检查、手术到术后病理/会诊的关键资料。</p></div><span class="pill">'+rows.length+' 条</span></div><div class="history-track">'+rows.map((r,i)=>'<article class="history-item"><div class="history-dot">'+(i+1)+'</div><div><p class="date">'+esc(r.date)+' · '+esc(TYPES[r.type]||r.type)+'</p><h3>'+esc(r.title)+'</h3><p>'+esc(r.summary||r.details||'')+'</p></div></article>').join('')+'</div></section>')}
function timeline(){const rows=rec(['treatment','visit','imaging','medication']).filter(r=>/手术|化疗|替吉奥|AG|复查|门诊|CT|MRI|PET|Cd+/.test(text(r))).slice(0,180);appShell('<section class="card"><div class="section-head"><h2>治疗时间线</h2><input id="q" value="'+esc(state.q)+'" placeholder="搜索 AG、替吉奥、复诊、发热…"></div><div class="list">'+rows.map(record).join('')+'</div></section>')}
function record(r){return '<article class="record"><div class="record-top"><span class="date">'+esc(r.date)+'</span><span class="pill">'+esc(TYPES[r.type]||r.type)+'</span></div><h3>'+esc(r.title)+'</h3><p class="preline">'+esc(r.summary||r.details||'')+'</p>'+(r.metrics?.length?'<div class="metric-row">'+r.metrics.slice(0,r.type==='lab'?80:6).filter(m=>m.key!=='备注').map(m=>metricCard({...m,raw:m.value})).join('')+'</div>':'')+'</article>'}
function chart(rows,key){const pts=rows.map(r=>({date:r.date,v:metric(r,[key])?.value})).filter(x=>Number.isFinite(x.v));if(pts.length<2)return '<div class="empty">可绘制数据不足</div>';const w=900,h=300,l=54,rr=18,t=18,b=42;const vals=pts.map(p=>p.v),min=Math.min(0,...vals),max=Math.max(...vals)||1;const x=i=>l+i*(w-l-rr)/Math.max(1,pts.length-1), y=v=>t+(1-(v-min)/Math.max(1,max-min))*(h-t-b);const d=pts.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+','+y(p.v).toFixed(1)).join(' ');return '<div class="chart-scroll"><svg viewBox="0 0 '+w+' '+h+'" class="chart">'+[0,.25,.5,.75,1].map(g=>{const v=min+(max-min)*g;return '<line x1="'+l+'" x2="'+(w-rr)+'" y1="'+y(v)+'" y2="'+y(v)+'" class="gridline"/><text x="6" y="'+(y(v)+4)+'">'+(v>=100?Math.round(v):v.toFixed(1))+'</text>'}).join('')+'<path d="'+d+'" fill="none" stroke="var(--brand)" stroke-width="3"/>'+pts.map((p,i)=>'<circle cx="'+x(i).toFixed(1)+'" cy="'+y(p.v).toFixed(1)+'" r="4" fill="var(--brand)"><title>'+p.date+'：'+p.v+'</title></circle>').join('')+'</svg></div>'}
function labs(){const keys=metricKeys('lab'), rows=rec(['lab']);if(!keys.includes(state.labMetric))state.labMetric=keys[0]||'WBC';appShell('<section class="card"><div class="section-head"><h2>血液检查趋势</h2><select id="labMetric">'+keys.map(k=>'<option '+(k===state.labMetric?'selected':'')+'>'+esc(k)+'</option>').join('')+'</select></div>'+chart(rows,state.labMetric)+'<div class="table-wrap"><table><thead><tr><th>日期</th><th>'+esc(state.labMetric)+'</th><th>摘要</th></tr></thead><tbody>'+[...rows].reverse().map(r=>{const m=metric(r,[state.labMetric]);return '<tr><td>'+esc(r.date)+'</td><td>'+esc(m?.raw||'')+(m?.unit?' '+esc(m.unit):'')+' '+badge(m?.raw,m?.status)+(m?.ref?'<br><small>参考：'+esc(m.ref)+'</small>':'')+'</td><td>'+esc(r.summary||'')+'</td></tr>'}).join('')+'</tbody></table></div></section>')}
function markers(){const keys=metricKeys('marker'), rows=rec(['marker']);if(!keys.includes(state.markerMetric))state.markerMetric=keys.find(k=>/CA19/.test(k))||keys[0]||'CA19-9';appShell('<section class="card"><div class="section-head"><h2>肿瘤标志物趋势</h2><select id="markerMetric">'+keys.map(k=>'<option '+(k===state.markerMetric?'selected':'')+'>'+esc(k)+'</option>').join('')+'</select></div>'+chart(rows,state.markerMetric)+'<div class="table-wrap"><table><thead><tr><th>日期</th>'+keys.slice(0,8).map(k=>'<th>'+esc(k)+'</th>').join('')+'<th>摘要</th></tr></thead><tbody>'+[...rows].reverse().map(r=>'<tr><td>'+esc(r.date)+'</td>'+keys.slice(0,8).map(k=>{const m=metric(r,[k]);return '<td>'+esc(m?.raw||'')+' '+badge(m?.raw,markerStatus(k,m?.raw))+'</td>'}).join('')+'<td>'+esc(r.summary||'')+'</td></tr>').join('')+'</tbody></table></div></section>')}
function imaging(){const rows=rec(['imaging']);appShell('<section class="card"><div class="section-head"><h2>影像随访</h2><input id="q" value="'+esc(state.q)+'" placeholder="搜索肺结节、肝脏、淋巴结…"></div><div class="list">'+[...rows].reverse().map(r=>'<article class="record"><div class="record-top"><span class="date">'+esc(r.date)+'</span><span class="pill">影像</span></div><h3>'+esc(r.title)+'</h3><details open><summary>查看摘要/报告</summary><p class="preline">'+esc(r.details||r.summary||'')+'</p></details></article>').join('')+'</div></section>')}
function meds(){const rows=rec(['treatment','medication']).filter(r=>/AG|替吉奥|吉西|白紫|化疗|Cd+|减量|停药|用药|剂量/.test(text(r)));appShell('<section class="card"><div class="section-head"><h2>用药与治疗周期</h2><input id="q" value="'+esc(state.q)+'" placeholder="搜索方案、剂量、周期…"></div><div class="list">'+rows.map(record).join('')+'</div></section>')}
function events(){const rows=rec(null).filter(r=>r.type==='fever'||/发热|感染|骨髓|升白针|麻木|过敏|腹泻|口腔|CRP|白细胞|中性粒/.test(text(r)));appShell('<section class="card"><div class="section-head"><h2>病情事件</h2><input id="q" value="'+esc(state.q)+'" placeholder="搜索发热、感染、骨髓抑制…"></div><div class="list">'+rows.map(record).join('')+'</div></section>')}
function summaryText(){const p=state.profile, mark=latest('marker'), img=latest('imaging');const recent=rec(null).slice(-8).reverse();return '【患者】\n'+(p.name||'')+'\n\n【诊断/分期】\n'+(p.diagnosis||'')+'\n\n【手术情况】\n'+(p.surgery||'')+'\n\n【病理诊断】\n'+(p.pathology||'')+'\n\n【基因检测】\n'+(p.geneticTesting||'')+'\n\n【当前治疗状态】\n'+(p.stage||'')+'\n\n【免疫组化】\n'+(p.immunohistochemistry||'')+'\n\n【最近肿瘤标志物】\n'+(p.latestMarker||'')+'\n'+(mark?mark.date+' '+mark.summary:'')+'\n\n【最近影像】\n'+(p.latestImaging||'')+'\n'+(img?img.date+' '+img.title:'')+'\n\n【近期记录】\n'+recent.map(r=>'- '+r.date+' '+r.title+'：'+(r.summary||'').slice(0,120)).join('\n')}
function summary(){appShell('<section class="card"><div class="section-head"><h2>一页就医摘要</h2><button id="copySummary">复制摘要</button></div><p class="summary" id="summaryText">'+esc(summaryText())+'</p></section>')}
function bind(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;state.q='';render()});const q=document.getElementById('q');if(q)q.oninput=e=>{state.q=e.target.value;render()};const lm=document.getElementById('labMetric');if(lm)lm.onchange=e=>{state.labMetric=e.target.value;render()};const mm=document.getElementById('markerMetric');if(mm)mm.onchange=e=>{state.markerMetric=e.target.value;render()};const pr=document.getElementById('print');if(pr)pr.onclick=()=>print();const cp=document.getElementById('copy');if(cp)cp.onclick=()=>navigator.clipboard.writeText(summaryText());const cs=document.getElementById('copySummary');if(cs)cs.onclick=()=>navigator.clipboard.writeText(summaryText())}
function render(){if(!state.profile)return unlock();({overview,history,timeline,labs,markers,imaging,meds,events,summary}[state.tab]||overview)()}
render();
</script></body></html>
