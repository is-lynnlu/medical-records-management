<title>患者病历整理助手</title>
<style>

fff;color:#6c5c52;border:1px solid var(--line);white-space:nowrap;box-shadow:0 4px 14px rgba(94,65,45,.05)}.tabs button.active{background:var(--brand);color:white;border-color:var(--brand)}.content{margin-top:4px}.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:var(--shadow)}.gap-top{margin-top:18px}.stat-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px}.stat span{display:block;color:var(--muted);font-size:13px;font-weight:800}.stat strong{display:block;margin:10px 0 8px;font-size:22px;line-height:1.25}.stat small{color:var(--muted)}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}.section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px}.section-head h2,.card h2{margin:0 0 8px;font-size:22px}.section-head input,.section-head select{min-width:260px;border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:#fff}.date{color:var(--brand);font-weight:850}.metric-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.metric-row span{background:var(--soft);border-radius:14px;padding:10px}.badge,.pill{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:800;background:#f0e5dc;color:#6d4b3c;margin:2px}.badge.high{background:#fee4e2;color:var(--red)}.badge.low{background:#dcfae6;color:var(--green)}.badge.normal{background:#dcfae6;color:var(--green)}.notice{background:#fff7e8;border:1px solid #f3d6aa;color:#6d4b00;border-radius:16px;padding:12px;margin:8px 0}.summary{white-space:pre-wrap}.history-track{display:grid;gap:14px}.history-item{display:grid;grid-template-columns:42px 1fr;gap:14px;padding:14px;border:1px solid var(--line);border-radius:18px;background:#fffdfa}.history-dot{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:var(--brand);color:#fff;font-weight:850}.history-item h3,.record h3{margin:4px 0 8px}.list{display:grid;gap:12px}.record{border:1px solid var(--line);border-radius:18px;background:#fffdfa;padding:16px}.record-top{display:flex;justify-content:space-between;gap:12px;align-items:center}.preline{white-space:pre-wrap}.chart-scroll{overflow:auto}.chart{width:100%;min-width:680px;height:280px}.gridline{stroke:#eadfd4;stroke-width:1}.limit,.ref-line{stroke:#c2410c;stroke-dasharray:5 5}.ref-band{fill:#dcfae6;opacity:.55}.axis-label{fill:#77695f;font-size:12px}.point-high{fill:var(--red)}.point-low{fill:var(--green)}.point-normal{fill:var(--brand)}.table-wrap{overflow:auto;margin-top:18px;border:1px solid var(--line);border-radius:18px}table{width:100%;border-collapse:collapse;background:white}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}.lab-table th,.lab-table td{white-space:nowrap}th{background:#fbf7f2;color:#6c5c52}.empty{color:var(--muted);background:#fbf7f2;border:1px dashed var(--line);border-radius:16px;padding:16px}.details-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}details{margin-top:8px}summary{cursor:pointer;color:var(--brand);font-weight:800}.footer{color:var(--muted);text-align:center;margin:26px 0 8px}@media(max-width:900px){.app{padding:14px}.hero{flex-direction:column;padding:22px}.hero h1{font-size:27px}.stat-grid,.two-col,.details-grid,.metric-row{grid-template-columns:1fr}.section-head{flex-direction:column}.section-head input,.section-head select{width:100%;min-width:0}.top-actions{justify-content:flex-start}.chart{min-width:560px}}@media print{.tabs,.top-actions,.unlock button{display:none!important}.app{max-width:none;padding:0}.hero,.card,.record,.history-item{box-shadow:none;break-inside:avoid}body{background:white}}

/* Lynn requested a compact archive view: force all visible text to 10pt. */
html,body,button,input,select,textarea,table,th,td,p,li,summary,details,span,small,b,strong,h1,h2,h3,h4,label,.hero h1,.card h2,.section-head h2,.stat strong,.eyebrow,.subtle,.date,.badge,.pill,.tabs button{font-size:10pt!important;line-height:1.45!important;letter-spacing:0!important}
.app{padding:18px!important;max-width:1180px!important}
.hero{padding:18px 20px!important;border-radius:18px!important}
.tabs{padding:10px 0!important;gap:6px!important}
.tabs button{padding:7px 11px!important}
.card{padding:16px!important;border-radius:16px!important}
.stat-grid{grid-template-columns:repeat(5,minmax(0,1fr))!important;gap:10px!important}
.two-col,.details-grid{gap:12px!important}
.gap-top{margin-top:12px!important}
.stat strong{margin:6px 0 4px!important;font-weight:750!important}
.metric-row{gap:8px!important}.metric-row span{padding:8px!important}
.section-head{margin-bottom:10px!important}.section-head input,.section-head select{padding:7px 9px!important;min-width:220px!important}
.record{padding:12px!important;border-radius:14px!important}.history-item{padding:10px!important;border-radius:14px!important}.history-dot{width:28px!important;height:28px!important;font-size:10pt!important}
.chart{height:220px!important}.table-wrap{margin-top:12px!important}th,td{padding:7px!important}.empty,.notice{padding:10px!important;border-radius:12px!important}
@media(max-width:900px){.app{padding:10px!important}.hero{padding:14px!important}.section-head input,.section-head select{min-width:0!important}}
.unlock-panel button{display:block!important;margin:22px auto 0!important}

/* Compact readable archive typography refinements */
.stat strong{font-weight:400!important;white-space:pre-line!important;color:#2c241f!important}
.stat span,.card h2,.section-head h2{font-weight:600!important}
b,strong{font-weight:400!important}

.seg-list{display:grid;gap:1em;margin-top:4px}
.seg-item{position:relative;white-space:pre-wrap;padding-left:1.15em;font-weight:400!important;color:#2c241f!important}
.seg-item:before{content:"•";position:absolute;left:0;top:0;color:#444;font-size:1em;line-height:1.45}

/* Align overview card titles with lower section titles */
.stat span{display:block!important;color:#2c241f!important;font-size:10pt!important;font-weight:600!important;line-height:1.45!important;margin:0 0 8px!important}
.overview-metrics{grid-template-columns:1.18fr .82fr!important}
.lab-card .metric-row{grid-template-columns:repeat(2,minmax(270px,1fr))!important}
.marker-card .metric-row{grid-template-columns:repeat(2,minmax(150px,1fr))!important}
.metric-row span.metric-item{display:flex!important;flex-direction:column!important;min-height:86px!important}
.metric-title{display:block!important;min-height:2.2em!important;font-weight:400!important;border-bottom:1px solid #e5d8cd!important;padding-bottom:6px!important;margin-bottom:8px!important;white-space:nowrap!important}
.metric-value{display:flex!important;align-items:center!important;gap:6px!important;margin-top:auto!important}
.metric-value .badge{padding:3px 9px!important;margin:0!important;display:inline-flex!important;width:auto!important}
@media(max-width:900px){.overview-metrics,.lab-card .metric-row,.marker-card .metric-row{grid-template-columns:1fr!important}.metric-title{white-space:normal!important}}
.therapy-timeline{display:grid;gap:14px;position:relative}
.therapy-period{display:grid;grid-template-columns:230px 1fr;gap:14px;align-items:start}
.therapy-date{position:sticky;top:68px;background:var(--brand);color:white;border-radius:14px;padding:10px 12px;text-align:center;font-weight:700;white-space:nowrap}
.therapy-body{background:#fffdfa;border:1px solid var(--line);border-radius:16px;padding:14px}
.therapy-body h3{margin:0 0 8px!important}
.therapy-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.therapy-meta .pill{margin:0!important}
.therapy-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.therapy-box{background:var(--soft);border-radius:14px;padding:10px}
.therapy-box h4{margin:0 0 8px!important;font-weight:600!important;color:#2c241f}
.therapy-box ul{margin:0;padding-left:1.2em}
.therapy-box li{margin:0 0 4px}
@media(max-width:900px){.therapy-period{grid-template-columns:1fr}.therapy-date{position:static}.therapy-grid{grid-template-columns:1fr}}
.therapy-timeline{gap:0!important;padding:4px 0!important}
.therapy-period{grid-template-columns:210px 38px 1fr!important;gap:12px!important;position:relative}
.therapy-period:not(:last-child){padding-bottom:18px!important}
.therapy-date{position:static!important;align-self:start!important;margin-top:4px!important}
.therapy-axis{position:relative;align-self:stretch;min-height:68px}
.therapy-axis:before{content:"";position:absolute;left:50%;top:0;bottom:-18px;width:3px;background:#2c241f;transform:translateX(-50%);border-radius:999px}
.therapy-period:last-child .therapy-axis:before{bottom:50%}
.therapy-dot{position:absolute;left:50%;top:18px;width:18px;height:18px;background:var(--brand);border:4px solid #fff;box-shadow:0 0 0 2px var(--line),0 0 0 7px rgba(155,80,56,.10);border-radius:50%;transform:translate(-50%,-50%);z-index:1}
.therapy-body{padding:0!important;overflow:hidden}
.therapy-body summary{list-style:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px;cursor:pointer}
.therapy-body summary::-webkit-details-marker{display:none}
.therapy-summary h3{margin:8px 0 0!important}
.therapy-expand{color:var(--brand);font-weight:700;white-space:nowrap}
.therapy-body[open] .therapy-expand:before{content:"收起"}
.therapy-body:not([open]) .therapy-expand:before{content:"展开"}
.therapy-grid{padding:0 14px 14px!important}
@media(max-width:900px){.therapy-period{grid-template-columns:1fr!important}.therapy-axis{display:none}.therapy-date{margin:0 0 8px!important}.therapy-period:not(:last-child){padding-bottom:12px!important}}
.lab-table th{vertical-align:middle}.lab-table th .lab-cn,.lab-table th .lab-abbr,.lab-table th .lab-ref{display:block;line-height:1.35!important}.lab-table th .lab-cn{font-weight:750!important;color:#2c241f!important}.lab-table th .lab-abbr{font-weight:650!important;color:#6c5c52!important}.lab-table th .lab-ref{font-weight:500!important;color:#77695f!important;font-size:12px!important}.lab-table td small{display:none}.lab-table th:first-child,.lab-table td:first-child{position:sticky;left:0;z-index:2;background:#fff;border-right:2px solid #e2d2c4;box-shadow:5px 0 8px rgba(94,65,45,.06)}.lab-table th:first-child{z-index:4;background:#fbf7f2}.lab-table-toolbar{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:14px 0 8px}.lab-filter{display:flex;align-items:end;justify-content:flex-end;gap:10px;flex-wrap:wrap;margin-left:auto}.lab-filter label{display:grid;gap:4px;color:#5b4b42;font-weight:600}.lab-filter input{border:1px solid var(--line);border-radius:12px;padding:7px 9px;background:#fff}.lab-filter button{padding:7px 12px}.lab-count{color:var(--muted);align-self:center;font-weight:600}
@media(max-width:900px){.lab-table-toolbar{align-items:stretch}.lab-filter{width:100%;justify-content:flex-start;margin-left:0}.lab-count{width:100%}}
</style>

async function decryptPayload(payload,pw){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(payload.salt),iterations:payload.iterations,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);const enc=b64(payload.data),tag=b64(payload.tag),all=new Uint8Array(enc.length+tag.length);all.set(enc);all.set(tag,enc.length);const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(payload.iv)},key,all);return JSON.parse(new TextDecoder().decode(plain))}

function unlock(error=''){root.innerHTML='<main class="unlock"><form class="unlock-panel" id="unlock"><p class="eyebrow">Medical Record Archive</p><h1>患者病历整理助手</h1><p>病历内容已加密。输入密码后，仅在当前浏览器中解密查看。</p><label class="field"><span>访问密码</span><input id="pw" type="password" autofocus></label>'+(error?'<p class="error">'+esc(error)+'</p>':'')+'<button>查看病历档案</button></form></main>';document.getElementById('unlock').onsubmit=async e=>{e.preventDefault();try{const pw=document.getElementById('pw').value;const seed=await decrypt(pw);const updates=await decryptExternalUpdates(pw);state.profile={...seed.profile,...Object.assign({},...updates.map(u=>u.profilePatch||{}))};state.records=[...(seed.records||[]),...updates.flatMap(u=>u.records||[])];render()}catch{unlock('密码不正确，或浏览器不支持本地解密。')}}}
function text(r){return [r.date,r.type,r.title,r.summary,r.details,r.source,(r.tags||[]).join(' '),(r.metrics||[]).map(m=>[m.key,m.cn,m.abbr,m.en,m.value,m.ref,m.unit].filter(Boolean).join(' ')).join(' ')].join(' ')}function rec(types){return state.records.filter(r=>!types||types.includes(r.type)).filter(r=>!state.q||text(r).toLowerCase().includes(state.q.toLowerCase())).sort((a,b)=>a.date.localeCompare(b.date))}function latest(type){return rec([type]).at(-1)}function latestWithMetrics(type){return rec([type]).filter(r=>Array.isArray(r.metrics)&&r.metrics.length>0).at(-1)||latest(type)}function num(v){const m=String(v||'').replace(/[↑↓,]/g,'').match(/-?\d+(\.\d+)?/);return m?Number(m[0]):null}function canonicalMetricKey(key){const s=String(key||'').trim();if(/^NEUT[#3]\b/i.test(s)||/中性粒细胞绝对值/.test(s))return 'NEUT3 中性粒细胞绝对值';return s}function canonicalMetric(m){if(!m)return m;const key=canonicalMetricKey(m.key);return key===m.key?m:{...m,key}}function metric(r,keys){const targets=keys.map(canonicalMetricKey);for(const raw of r.metrics||[]){const m=canonicalMetric(raw);const hay=[m.key,m.cn,m.abbr,m.en].filter(Boolean).join(' ').toLowerCase();if(targets.some(k=>hay.includes(k.toLowerCase()))){return {...m,raw:m.value,value:num(m.value)}}}return null}function metricKeys(type){const set=new Set();rec([type]).forEach(r=>(r.metrics||[]).forEach(m=>set.add(type==='lab'?canonicalMetricKey(m.key):m.key)));return [...set]}

function oralCourseItems(rows,p){if(p?.start==='2026-04-29')return ['2026-04-29~2026-05-12：疗程一','2026-05-20~2026-06-02：疗程二','2026-06-10~2026-06-23：疗程三','2026-07-02~2026-07-15：疗程四'];const courses={};rows.filter(r=>r.type==='medication'&&/替吉奥\s*D?1\b|替吉奥\s*D?14\b/i.test(schemeText(r))&&!/进口/.test(schemeText(r))).forEach(r=>{const n=courseNo(r);if(!n||n>10)return;if(!courses[n])courses[n]={};if(/替吉奥\s*D?1\b/i.test(schemeText(r))&&!courses[n].start)courses[n].start=r.date;if(/替吉奥\s*D?14\b/i.test(schemeText(r))&&!courses[n].end)courses[n].end=r.date});return Array.from({length:10},(_,i)=>i+1).map(n=>courses[n]?.start&&courses[n]?.end?courses[n].start+'~'+courses[n].end+'：疗程'+courseName(n):'').filter(Boolean)}

function cleanEventText(r){const s=(r.summary||r.title||'事件').replace(/\s+/g,' ');if(/摔倒|摔伤|跌倒|缝针/.test(s))return '摔倒缝针';if(/发热|发烧/.test(s)){const m=s.match(/发(?:热|烧)\s*\d+(?:\.\d+)?/);return m?m[0]:s}if(/感染|左氧|可乐必妥|停可乐|上呼吸道/.test(s))return s.replace(/复诊（程月鹃）；?|抽血；?|血常规；?|肿标；?/g,'').trim();return ''}

function eventItems(rows,p){if(p?.kind==='手术')return ['2024-04-20：乳糜漏；处理：调整饮食'];if(p?.start==='2026-04-29')return currentOralEvents();const marrow=marrowEvents(rows);const other=rows.filter(r=>r.date!=='2025-06-01'&&!/升白针|进口/.test(schemeText(r))&&r.type!=='lab'&&/骨髓|发热|发烧|摔|跌|感染|左氧|可乐必妥|停可乐|上呼吸道/.test(schemeText(r))).sort((a,b)=>displayDate(a).localeCompare(displayDate(b))).map(r=>{const cleaned=cleanEventText(r);return cleaned?displayDate(r)+'：'+cleaned:''});return uniq([...marrow,...other]).slice(0,12)}

function inLabRange(r){return (!state.labStart||r.date>=state.labStart)&&(!state.labEnd||r.date<=state.labEnd)}
function labRangeControls(){return '<div class="lab-filter"><label>开始日期<input type="date" id="labStart" value="'+esc(state.labStart)+'"></label><label>结束日期<input type="date" id="labEnd" value="'+esc(state.labEnd)+'"></label><button class="secondary" id="labRangeReset">重置时间</button></div>'}
function labTableToolbar(rows,total){return '<div class="lab-table-toolbar"><span class="lab-count">显示 '+rows.length+' / '+total+' 条有结果记录</span>'+labRangeControls()+'</div>'}
function chart(rows,key){const pts=rows.map(r=>{const m=metric(r,[key]);return {date:r.date,v:m?.value,raw:m?.raw||m?.value,ref:displayRef(m,key),st:metricStatus(m,key)}}).filter(x=>Number.isFinite(x.v));if(pts.length<2)return '<div class="empty">可绘制数据不足</div>';const bounds=refBounds(pts.find(p=>p.ref)?.ref||defaultRef(key));const w=960,h=330,l=58,rr=24,t=22,b=62;const vals=pts.map(p=>p.v).concat(bounds?[bounds.low,bounds.high].filter(Number.isFinite):[]),pad=Math.max(1,(Math.max(...vals)-Math.min(...vals))*.12);const min=Math.min(0,...vals)-pad,max=(Math.max(...vals)||1)+pad;const x=i=>l+i*(w-l-rr)/Math.max(1,pts.length-1), y=v=>t+(1-(v-min)/Math.max(1,max-min))*(h-t-b);const d=pts.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+','+y(p.v).toFixed(1)).join(' ');const ticks=[0,.25,.5,.75,1].map(g=>{const v=min+(max-min)*g;return '<line x1="'+l+'" x2="'+(w-rr)+'" y1="'+y(v)+'" y2="'+y(v)+'" class="gridline"/><text x="6" y="'+(y(v)+4)+'" class="axis-label">'+(Math.abs(v)>=100?Math.round(v):v.toFixed(1))+'</text>'}).join('');let refMark='';if(bounds){if(Number.isFinite(bounds.low)&&Number.isFinite(bounds.high)){refMark='<rect x="'+l+'" y="'+y(bounds.high)+'" width="'+(w-l-rr)+'" height="'+Math.max(1,y(bounds.low)-y(bounds.high))+'" class="ref-band"><title>参考范围：'+bounds.low+'–'+bounds.high+'</title></rect>'}else{const v=Number.isFinite(bounds.high)?bounds.high:bounds.low;refMark='<line x1="'+l+'" x2="'+(w-rr)+'" y1="'+y(v)+'" y2="'+y(v)+'" class="ref-line"><title>参考界值：'+v+'</title></line>'}}
const step=Math.max(1,Math.ceil(pts.length/6));const labels=pts.map((p,i)=>(i%step===0||i===pts.length-1)?'<text x="'+x(i).toFixed(1)+'" y="'+(h-24)+'" text-anchor="middle" class="axis-label">'+p.date.slice(2)+'</text>':'').join('');const circles=pts.map((p,i)=>'<circle cx="'+x(i).toFixed(1)+'" cy="'+y(p.v).toFixed(1)+'" r="4.5" class="point-'+(p.st==='high'?'high':p.st==='low'?'low':'normal')+'"><title>'+p.date+'：'+p.raw+(p.ref?'；参考 '+p.ref:'')+'</title></circle>').join('');return '<div class="chart-scroll"><svg viewBox="0 0 '+w+' '+h+'" class="chart">'+refMark+ticks+'<path d="'+d+'" fill="none" stroke="var(--brand)" stroke-width="3"/>'+circles+labels+'<text x="'+((w+l-rr)/2).toFixed(1)+'" y="'+(h-6)+'" text-anchor="middle" class="axis-label">日期</text></svg></div>'}
function labs(){const allRows=rec(['lab']).filter(hasLabResults), keys=labKeys(), rows=allRows.filter(inLabRange);if(!keys.includes(state.labMetric))state.labMetric=keys[0]||'WBC 白细胞';const header='<tr><th><span class="lab-cn">日期</span><span class="lab-abbr">Date</span><span class="lab-ref">/</span></th>'+keys.map(labHeaderCell).join('')+'<th><span class="lab-cn">备注</span><span class="lab-abbr">Note</span><span class="lab-ref">/</span></th></tr>';const body=[...rows].reverse().map(r=>'<tr><td>'+esc(r.date)+'</td>'+keys.map(k=>'<td>'+metricCell(metric(r,[k]),k)+'</td>').join('')+'<td>'+esc(labRemark(r))+'</td></tr>').join('')||'<tr><td colspan="'+(keys.length+2)+'">所选时间段内没有血检结果</td></tr>';appShell('<section class="card"><div class="section-head"><h2>血液检查趋势</h2><select id="labMetric">'+keys.map(k=>'<option '+(k===state.labMetric?'selected':'')+'>'+esc(k)+'</option>').join('')+'</select></div>'+chart(rows,state.labMetric)+labTableToolbar(rows,allRows.length)+'<div class="table-wrap"><table class="lab-table"><thead>'+header+'</thead><tbody>'+body+'</tbody></table></div></section>')}
function markers(){const keys=metricKeys('marker'), rows=rec(['marker']);if(!keys.includes(state.markerMetric))state.markerMetric=keys.find(k=>/CA19/.test(k))||keys[0]||'CA19-9';appShell('<section class="card"><div class="section-head"><h2>肿瘤标志物趋势</h2><select id="markerMetric">'+keys.map(k=>'<option '+(k===state.markerMetric?'selected':'')+'>'+esc(k)+'</option>').join('')+'</select></div>'+chart(rows,state.markerMetric)+'<div class="table-wrap"><table><thead><tr><th>日期</th>'+keys.slice(0,8).map(k=>'<th>'+esc(k)+'</th>').join('')+'<th>摘要</th></tr></thead><tbody>'+[...rows].reverse().map(r=>'<tr><td>'+esc(r.date)+'</td>'+keys.slice(0,8).map(k=>{const m=metric(r,[k]);return '<td>'+esc(labDisplayValue(m))+' '+badge(m?.raw,markerStatus(k,m?.raw))+'</td>'}).join('')+'<td>'+esc(r.summary||'')+'</td></tr>').join('')+'</tbody></table></div></section>')}
function imaging(){const rows=rec(['imaging']);appShell('<section class="card"><div class="section-head"><h2>影像随访</h2><input id="q" value="'+esc(state.q)+'" placeholder="搜索肺结节、肝脏、淋巴结…"></div><div class="list">'+[...rows].reverse().map(r=>'<article class="record"><div class="record-top"><span class="date">'+esc(r.date)+'</span><span class="pill">影像</span></div><h3>'+esc(r.title)+'</h3><details open><summary>查看摘要/报告</summary><p class="preline">'+esc(r.details||r.summary||'')+'</p></details></article>').join('')+'</div></section>')}
function meds(){const rows=rec(['treatment','medication']).filter(r=>/AG|替吉奥|吉西|白紫|化疗|Cd+|减量|停药|用药|剂量/.test(text(r)));appShell('<section class="card"><div class="section-head"><h2>用药与治疗周期</h2><input id="q" value="'+esc(state.q)+'" placeholder="搜索方案、剂量、周期…"></div><div class="list">'+rows.map(record).join('')+'</div></section>')}
function events(){const rows=rec(null).filter(r=>r.type==='fever'||/发热|感染|骨髓|升白针|麻木|过敏|腹泻|口腔|CRP|白细胞|中性粒/.test(text(r)));appShell('<section class="card"><div class="section-head"><h2>病情事件</h2><input id="q" value="'+esc(state.q)+'" placeholder="搜索发热、感染、骨髓抑制…"></div><div class="list">'+rows.map(record).join('')+'</div></section>')}
function summaryText(){const p=state.profile, mark=latest('marker'), img=latest('imaging');const recent=rec(null).slice(-8).reverse();return '【患者】\n'+(p.name||'')+'\n\n【诊断/分期】\n'+(p.diagnosis||'')+'\n\n【手术情况】\n'+(p.surgery||'')+'\n\n【病理诊断】\n'+(p.pathology||'')+'\n\n【基因检测】\n'+(p.geneticTesting||'')+'\n\n【当前治疗状态】\n'+(p.stage||'')+'\n\n【免疫组化】\n'+(p.immunohistochemistry||'')+'\n\n【最近肿瘤标志物】\n'+(p.latestMarker||'')+'\n'+(mark?mark.date+' '+mark.summary:'')+'\n\n【最近影像】\n'+(p.latestImaging||'')+'\n'+(img?img.date+' '+img.title:'')+'\n\n【近期记录】\n'+recent.map(r=>'- '+r.date+' '+r.title+'：'+(r.summary||'').slice(0,120)).join('\n')}
function summary(){appShell('<section class="card"><div class="section-head"><h2>一页就医摘要</h2><button id="copySummary">复制摘要</button></div><p class="summary" id="summaryText">'+esc(summaryText())+'</p></section>')}
function bind(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;state.q='';render()});const q=document.getElementById('q');if(q)q.oninput=e=>{state.q=e.target.value;render()};const lm=document.getElementById('labMetric');if(lm)lm.onchange=e=>{state.labMetric=e.target.value;render()};const ls=document.getElementById('labStart');if(ls)ls.onchange=e=>{state.labStart=e.target.value;render()};const le=document.getElementById('labEnd');if(le)le.onchange=e=>{state.labEnd=e.target.value;render()};const lr=document.getElementById('labRangeReset');if(lr)lr.onclick=()=>{state.labStart='';state.labEnd='';render()};const mm=document.getElementById('markerMetric');if(mm)mm.onchange=e=>{state.markerMetric=e.target.value;render()};const pr=document.getElementById('print');if(pr)pr.onclick=()=>print();const cp=document.getElementById('copy');if(cp)cp.onclick=()=>navigator.clipboard.writeText(summaryText());const cs=document.getElementById('copySummary');if(cs)cs.onclick=()=>navigator.clipboard.writeText(summaryText())}
function render(){if(!state.profile)return unlock();({overview,timeline,labs,markers,imaging,meds,events,summary}[state.tab]||overview)()}
render();
</script></body></html>
