name: Patch labs view
on:
  push:
    paths:
      - '.github/workflows/patch-labs-view.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch labs module
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text()
          def repl(old,new,label):
              global s
              if old not in s:
                  raise SystemExit(f'missing {label}')
              s=s.replace(old,new,1)
          repl('.badge.high,.badge.low{background:#fee4e2;color:var(--red)}.badge.normal{background:#dcfae6;color:var(--green)}','.badge.high{background:#fee4e2;color:var(--red)}.badge.low{background:#dcfae6;color:var(--green)}.badge.normal{background:#dcfae6;color:var(--green)}','badge css')
          repl('.limit{stroke:#c2410c;stroke-dasharray:5 5}', '.limit,.ref-line{stroke:#c2410c;stroke-dasharray:5 5}.ref-band{fill:#dcfae6;opacity:.55}.axis-label{fill:#77695f;font-size:12px}.point-high{fill:var(--red)}.point-low{fill:var(--green)}.point-normal{fill:var(--brand)}', 'chart css')
          repl('th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}', 'th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}.lab-table th,.lab-table td{white-space:nowrap}', 'table css')
          old_chart='''function chart(rows,key){const pts=rows.map(r=>({date:r.date,v:metric(r,[key])?.value})).filter(x=>Number.isFinite(x.v));if(pts.length<2)return '<div class="empty">可绘制数据不足</div>';const w=900,h=300,l=54,rr=18,t=18,b=42;const vals=pts.map(p=>p.v),min=Math.min(0,...vals),max=Math.max(...vals)||1;const x=i=>l+i*(w-l-rr)/Math.max(1,pts.length-1), y=v=>t+(1-(v-min)/Math.max(1,max-min))*(h-t-b);const d=pts.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+','+y(p.v).toFixed(1)).join(' ');return '<div class="chart-scroll"><svg viewBox="0 0 '+w+' '+h+'" class="chart">'+[0,.25,.5,.75,1].map(g=>{const v=min+(max-min)*g;return '<line x1="'+l+'" x2="'+(w-rr)+'" y1="'+y(v)+'" y2="'+y(v)+'" class="gridline"/><text x="6" y="'+(y(v)+4)+'">'+(v>=100?Math.round(v):v.toFixed(1))+'</text>'}).join('')+'<path d="'+d+'" fill="none" stroke="var(--brand)" stroke-width="3"/>'+pts.map((p,i)=>'<circle cx="'+x(i).toFixed(1)+'" cy="'+y(p.v).toFixed(1)+'" r="4" fill="var(--brand)"><title>'+p.date+'：'+p.v+'</title></circle>').join('')+'</svg></div>'}'''
          new_chart='''const DEFAULT_REFS={'WBC 白细胞':'3.50–9.50','NEUT3 中性粒细胞绝对值':'2.00–7.50','NEUT# 中性粒细胞绝对值':'2.00–7.50','HGB 血红蛋白':'120–160','PLT 血小板':'100–350','RBC 红细胞':'4.00–5.50','AST 天门冬氨酸氨基转移酶':'15–40','GGT 谷氨酰转肽酶':'10–60','ALP 碱性磷酸酶':'45–125','GLU 葡萄糖':'3.9–6.1','hs-CRP C反应蛋白（超敏）':'<3.00'};
function defaultRef(key){return DEFAULT_REFS[key]||''}
function refBounds(ref){const s=String(ref||'').replace(/参考值|参考|：|:/g,'').trim();if(!s)return null;const nums=[...s.matchAll(/\d+(?:\.\d+)?/g)].map(m=>Number(m[0]));if(/[≤<]/.test(s)&&nums.length)return {high:nums[0]};if(/[≥>]/.test(s)&&nums.length)return {low:nums[0]};if(nums.length>=2)return {low:nums[0],high:nums[1]};return null}
function refStatus(value,ref){const v=Number(value);const b=refBounds(ref);if(!Number.isFinite(v)||!b)return '';if(Number.isFinite(b.high)&&v>b.high)return 'high';if(Number.isFinite(b.low)&&v<b.low)return 'low';return 'normal'}
function metricStatus(m,key){return m?.status||status(m?.raw||m?.value)||refStatus(m?.value, m?.ref||defaultRef(key))}
function displayRef(m,key){return m?.ref||defaultRef(key)||''}
function labKeys(){return metricKeys('lab').filter(k=>k!=='备注')}
function labRemark(r){const m=metric(r,['备注']);return m?.raw||m?.value||''}
function metricCell(m,key){if(!m)return '';const ref=displayRef(m,key), st=metricStatus(m,key);return esc(m.raw||m.value||'')+(m.unit?' '+esc(m.unit):'')+' '+badge(m?.raw||m?.value,st)+(ref?'<br><small>'+esc(ref)+'</small>':'')}
function chart(rows,key){const pts=rows.map(r=>{const m=metric(r,[key]);return {date:r.date,v:m?.value,raw:m?.raw||m?.value,ref:displayRef(m,key),st:metricStatus(m,key)}}).filter(x=>Number.isFinite(x.v));if(pts.length<2)return '<div class="empty">可绘制数据不足</div>';const bounds=refBounds(pts.find(p=>p.ref)?.ref||defaultRef(key));const w=960,h=330,l=58,rr=24,t=22,b=62;const vals=pts.map(p=>p.v).concat(bounds?[bounds.low,bounds.high].filter(Number.isFinite):[]),pad=Math.max(1,(Math.max(...vals)-Math.min(...vals))*.12);const min=Math.min(0,...vals)-pad,max=(Math.max(...vals)||1)+pad;const x=i=>l+i*(w-l-rr)/Math.max(1,pts.length-1), y=v=>t+(1-(v-min)/Math.max(1,max-min))*(h-t-b);const d=pts.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+','+y(p.v).toFixed(1)).join(' ');const ticks=[0,.25,.5,.75,1].map(g=>{const v=min+(max-min)*g;return '<line x1="'+l+'" x2="'+(w-rr)+'" y1="'+y(v)+'" y2="'+y(v)+'" class="gridline"/><text x="6" y="'+(y(v)+4)+'" class="axis-label">'+(Math.abs(v)>=100?Math.round(v):v.toFixed(1))+'</text>'}).join('');let refMark='';if(bounds){if(Number.isFinite(bounds.low)&&Number.isFinite(bounds.high)){refMark='<rect x="'+l+'" y="'+y(bounds.high)+'" width="'+(w-l-rr)+'" height="'+Math.max(1,y(bounds.low)-y(bounds.high))+'" class="ref-band"><title>参考范围：'+bounds.low+'–'+bounds.high+'</title></rect>'}else{const v=Number.isFinite(bounds.high)?bounds.high:bounds.low;refMark='<line x1="'+l+'" x2="'+(w-rr)+'" y1="'+y(v)+'" y2="'+y(v)+'" class="ref-line"><title>参考界值：'+v+'</title></line>'}}
const step=Math.max(1,Math.ceil(pts.length/6));const labels=pts.map((p,i)=>(i%step===0||i===pts.length-1)?'<text x="'+x(i).toFixed(1)+'" y="'+(h-24)+'" text-anchor="middle" class="axis-label">'+p.date.slice(5)+'</text>':'').join('');const circles=pts.map((p,i)=>'<circle cx="'+x(i).toFixed(1)+'" cy="'+y(p.v).toFixed(1)+'" r="4.5" class="point-'+(p.st==='high'?'high':p.st==='low'?'low':'normal')+'"><title>'+p.date+'：'+p.raw+(p.ref?'；参考 '+p.ref:'')+'</title></circle>').join('');return '<div class="chart-scroll"><svg viewBox="0 0 '+w+' '+h+'" class="chart">'+refMark+ticks+'<path d="'+d+'" fill="none" stroke="var(--brand)" stroke-width="3"/>'+circles+labels+'</svg></div>'}'''
          repl(old_chart,new_chart,'chart function')
          old_labs='''function labs(){const keys=metricKeys('lab'), rows=rec(['lab']);if(!keys.includes(state.labMetric))state.labMetric=keys[0]||'WBC';appShell('<section class="card"><div class="section-head"><h2>血液检查趋势</h2><select id="labMetric">'+keys.map(k=>'<option '+(k===state.labMetric?'selected':'')+'>'+esc(k)+'</option>').join('')+'</select></div>'+chart(rows,state.labMetric)+'<div class="table-wrap"><table><thead><tr><th>日期</th><th>'+esc(state.labMetric)+'</th><th>摘要</th></tr></thead><tbody>'+[...rows].reverse().map(r=>{const m=metric(r,[state.labMetric]);return '<tr><td>'+esc(r.date)+'</td><td>'+esc(m?.raw||'')+(m?.unit?' '+esc(m.unit):'')+' '+badge(m?.raw,m?.status)+(m?.ref?'<br><small>参考：'+esc(m.ref)+'</small>':'')+'</td><td>'+esc(r.summary||'')+'</td></tr>'}).join('')+'</tbody></table></div></section>')}'''
          new_labs='''function labs(){const keys=labKeys(), rows=rec(['lab']);if(!keys.includes(state.labMetric))state.labMetric=keys[0]||'WBC 白细胞';const header='<tr><th>日期</th>'+keys.map(k=>'<th>'+esc(k)+'</th>').join('')+'<th>备注</th></tr>';const body=[...rows].reverse().map(r=>'<tr><td>'+esc(r.date)+'</td>'+keys.map(k=>'<td>'+metricCell(metric(r,[k]),k)+'</td>').join('')+'<td>'+esc(labRemark(r))+'</td></tr>').join('');appShell('<section class="card"><div class="section-head"><h2>血液检查趋势</h2><select id="labMetric">'+keys.map(k=>'<option '+(k===state.labMetric?'selected':'')+'>'+esc(k)+'</option>').join('')+'</select></div>'+chart(rows,state.labMetric)+'<div class="table-wrap"><table class="lab-table"><thead>'+header+'</thead><tbody>'+body+'</tbody></table></div></section>')}'''
          repl(old_labs,new_labs,'labs function')
          p.write_text(s)
          PY
      - name: Validate JavaScript
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const html=fs.readFileSync('index.html','utf8');
          const script=html.match(/<script>([\s\S]*)<\/script>/)[1];
          new Function(script);
          console.log('js syntax ok');
          NODE
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update lab table and trend chart [skip ci]" || exit 0
          git push
