name: Patch 2026 Oral Timeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    if: ${{ !contains(github.event.head_commit.message, 'Apply 2026 oral timeline patch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          replacements = [
              ("function oralDoseItems(rows){return ['3片/2次/day，20mg/片；吃两周休一周']}", "function oralDoseItems(rows){return ['替吉奥：3片/2次/day，20mg/片；吃两周休一周']}"),
              ("function oralCourseItems(rows,p){const courses={};rows.filter(r=>r.type==='medication'&&/替吉奥\\s*D?1\\b|替吉奥\\s*D?14\\b/i.test(schemeText(r))&&!/进口/.test(schemeText(r))).forEach(r=>{const n=courseNo(r);if(!n||n>10)return;if(!courses[n])courses[n]={};if(/替吉奥\\s*D?1\\b/i.test(schemeText(r))&&!courses[n].start)courses[n].start=r.date;if(/替吉奥\\s*D?14\\b/i.test(schemeText(r))&&!courses[n].end)courses[n].end=r.date});return Array.from({length:10},(_,i)=>i+1).map(n=>courses[n]?.start&&courses[n]?.end?courses[n].start+'~'+courses[n].end+'：疗程'+courseName(n):'').filter(Boolean)}", "function oralCourseItems(rows,p){if(p?.start==='2026-04-29')return ['2026-04-29~2026-05-12：疗程一','2026-05-20~2026-06-02：疗程二','2026-06-10~2026-06-23：疗程三','2026-07-02~2026-07-15：疗程四'];const courses={};rows.filter(r=>r.type==='medication'&&/替吉奥\\s*D?1\\b|替吉奥\\s*D?14\\b/i.test(schemeText(r))&&!/进口/.test(schemeText(r))).forEach(r=>{const n=courseNo(r);if(!n||n>10)return;if(!courses[n])courses[n]={};if(/替吉奥\\s*D?1\\b/i.test(schemeText(r))&&!courses[n].start)courses[n].start=r.date;if(/替吉奥\\s*D?14\\b/i.test(schemeText(r))&&!courses[n].end)courses[n].end=r.date});return Array.from({length:10},(_,i)=>i+1).map(n=>courses[n]?.start&&courses[n]?.end?courses[n].start+'~'+courses[n].end+'：疗程'+courseName(n):'').filter(Boolean)}"),
              ("function eventItems(rows){const marrow=marrowEvents(rows);const other=rows.filter(r=>r.date!=='2025-06-01'&&!/升白针|进口/.test(schemeText(r))&&r.type!=='lab'&&/骨髓|发热|发烧|摔|跌|感染|左氧|可乐必妥|停可乐|上呼吸道/.test(schemeText(r))).sort((a,b)=>displayDate(a).localeCompare(displayDate(b))).map(r=>{const cleaned=cleanEventText(r);return cleaned?displayDate(r)+'：'+cleaned:''});return uniq([...marrow,...other]).slice(0,12)}", "function currentOralEvents(){return ['2026-06-04~2026-06-05：发烧','2026-06-24~2026-06-26：发烧','2026-06-30：上呼吸道感染；处理：左氧氟沙星0.5g每日一次口服2周','2026-07-07：停可乐必妥（已服8天）']}\nfunction eventItems(rows,p){if(p?.start==='2026-04-29')return currentOralEvents();const marrow=marrowEvents(rows);const other=rows.filter(r=>r.date!=='2025-06-01'&&!/升白针|进口/.test(schemeText(r))&&r.type!=='lab'&&/骨髓|发热|发烧|摔|跌|感染|左氧|可乐必妥|停可乐|上呼吸道/.test(schemeText(r))).sort((a,b)=>displayDate(a).localeCompare(displayDate(b))).map(r=>{const cleaned=cleanEventText(r);return cleaned?displayDate(r)+'：'+cleaned:''});return uniq([...marrow,...other]).slice(0,12)}"),
              ("const doses=doseItems(rows,p), cycles=cycleItems(rows,p), events=eventItems(rows);", "const doses=doseItems(rows,p), cycles=cycleItems(rows,p), events=eventItems(rows,p);")
          ]
          changed = False
          for old, new in replacements:
              if old in s and new not in s:
                  s = s.replace(old, new, 1)
                  changed = True
          if changed:
              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patched index
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply 2026 oral timeline patch [skip ci]"
          git push
