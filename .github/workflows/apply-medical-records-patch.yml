name: Apply medical records patch

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-medical-records-patch.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Apply approved patch
        shell: bash
        run: |
          printf '%s' '' | base64 -d | gzip -d > /tmp/medical-records.patch
          git apply /tmp/medical-records.patch
      - name: Commit approved update and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/apply-medical-records-patch.yml
          git add -A
          git commit -m "Update lab trends and treatment timeline"
          git push origin HEAD:main
