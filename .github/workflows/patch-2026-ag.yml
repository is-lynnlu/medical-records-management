name: Patch 2026 AG Timeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    if: ${{ !contains(github.event.head_commit.message, 'Apply 2026 AG timeline patch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          replacements = [
              ("function inPeriod(r,p){return r.date>=p.start&&r.date<=p.end}", "function isShiftedRestartAg(r){return r.date>='2025-01-01'&&r.date<='2025-03-31'&&r.type==='treatment'&&/C[6-9]W\\d+化疗日/i.test(schemeText(r))}\nfunction effectiveDate(r){return isShiftedRestartAg(r)||(/重启AG/.test(schemeText(r))&&r.date>='2025-01-01'&&r.date<='2025-03-31')?'2026'+r.date.slice(4):r.date}\nfunction inPeriod(r,p){const d=effectiveDate(r);return d>=p.start&&d<=p.end}\nfunction displayDate(r){return effectiveDate(r)}"),
              ("function groupedDoseItems(items){const groups=[];items.filter(x=>x&&x.dose).forEach(x=>{const last=groups.at(-1);if(last&&last.dose===x.dose){last.end=x.date}else{groups.push({start:x.date,end:x.date,dose:x.dose})}});return groups.map(g=>compactDateRange(g.start,g.end)+'：'+g.dose)}", "function groupedDoseItems(items){const groups=[];items.filter(x=>x&&x.dose).sort((a,b)=>a.date.localeCompare(b.date)).forEach(x=>{const last=groups.at(-1);if(last&&last.dose===x.dose){last.end=x.date}else{groups.push({start:x.date,end:x.date,dose:x.dose})}});return groups.map(g=>compactDateRange(g.start,g.end)+'：'+g.dose)}"),
              ("function agDoseItems(rows){return groupedDoseItems(rows.filter(isChemoDay).map(r=>({date:r.date,dose:parseAgDose(r)})))}", "function agDoseItems(rows){return groupedDoseItems(rows.filter(isChemoDay).map(r=>({date:displayDate(r),dose:parseAgDose(r)})))}"),
              ("function cycleItems(rows,p){if(/AG/.test(p.name)){const cs=rows.filter(isChemoDay).map(r=>r.date+'：'+cycleCode(r)+' 化疗日');return uniq(cs)}if(/替吉奥/.test(p.name))return oralCourseItems(rows,p);return []}", "function cycleItems(rows,p){if(/AG/.test(p.name)){const cs=rows.filter(isChemoDay).sort((a,b)=>displayDate(a).localeCompare(displayDate(b))).map(r=>displayDate(r)+'：'+cycleCode(r)+' 化疗日');return uniq(cs)}if(/替吉奥/.test(p.name))return oralCourseItems(rows,p);return []}"),
              ("function marrowEvents(rows){const byDate={};rows.filter(r=>/升白针/.test(schemeText(r))).forEach(r=>{const lab=rows.find(x=>x.type==='lab'&&x.date===r.date), drop=bloodDropText(lab);if(!byDate[r.date])byDate[r.date]={date:r.date,drops:new Set(),shots:new Set()};if(drop)byDate[r.date].drops.add(drop);shotText(r).split('；').filter(Boolean).forEach(x=>byDate[r.date].shots.add(x))});return Object.values(byDate).map(e=>{if(e.date==='2025-10-07')return e.date+'：骨髓抑制'+(e.drops.size?'（'+[...e.drops].join('、')+'）':'')+'；处理：升白针（150ug，3天）；特比澳（4天）';const shots=[...e.shots].map(x=>'升白针'+x).join('；')||'升白针';return e.date+'：骨髓抑制'+(e.drops.size?'（'+[...e.drops].join('、')+'）':'')+'；处理：'+shots})}", "function marrowEvents(rows){const byDate={};rows.filter(r=>/升白针/.test(schemeText(r))).forEach(r=>{const d=displayDate(r), lab=rows.find(x=>x.type==='lab'&&displayDate(x)===d), drop=bloodDropText(lab);if(!byDate[d])byDate[d]={date:d,drops:new Set(),shots:new Set()};if(drop)byDate[d].drops.add(drop);shotText(r).split('；').filter(Boolean).forEach(x=>byDate[d].shots.add(x))});return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{if(e.date==='2025-10-07')return e.date+'：骨髓抑制'+(e.drops.size?'（'+[...e.drops].join('、')+'）':'')+'；处理：升白针（150ug，3天）；特比澳（4天）';const shots=[...e.shots].map(x=>'升白针'+x).join('；')||'升白针';return e.date+'：骨髓抑制'+(e.drops.size?'（'+[...e.drops].join('、')+'）':'')+'；处理：'+shots})}"),
              ("function eventItems(rows){const marrow=marrowEvents(rows);const other=rows.filter(r=>r.date!=='2025-06-01'&&!/升白针|进口/.test(schemeText(r))&&r.type!=='lab'&&/骨髓|发热|发烧|摔|跌|感染|左氧|可乐必妥|停可乐|上呼吸道/.test(schemeText(r))).map(r=>{const cleaned=cleanEventText(r);return cleaned?r.date+'：'+cleaned:''});return uniq([...marrow,...other]).slice(0,12)}", "function eventItems(rows){const marrow=marrowEvents(rows);const other=rows.filter(r=>r.date!=='2025-06-01'&&!/升白针|进口/.test(schemeText(r))&&r.type!=='lab'&&/骨髓|发热|发烧|摔|跌|感染|左氧|可乐必妥|停可乐|上呼吸道/.test(schemeText(r))).sort((a,b)=>displayDate(a).localeCompare(displayDate(b))).map(r=>{const cleaned=cleanEventText(r);return cleaned?displayDate(r)+'：'+cleaned:''});return uniq([...marrow,...other]).slice(0,12)}"),
              ("function therapyPeriod(p){const rows=rec(null).filter(r=>inPeriod(r,p));", "function therapyPeriod(p){const rows=rec(null).filter(r=>inPeriod(r,p)).sort((a,b)=>displayDate(a).localeCompare(displayDate(b)));")
          ]
          changed = False
          for old, new in replacements:
              if old in s and new not in s:
                  s = s.replace(old, new, 1)
                  changed = True
          if changed:
              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patched index
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply 2026 AG timeline patch [skip ci]"
          git push
