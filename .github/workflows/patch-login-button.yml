name: Patch Login Button Style

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    if: ${{ !contains(github.event.head_commit.message, 'Apply login button style patch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          rule = '.unlock-panel button{display:block!important;margin:22px auto 0!important}'
          if rule not in s:
              marker = '@media(max-width:900px){.app{padding:10px!important}.hero{padding:14px!important}.section-head input,.section-head select{min-width:0!important}}\n'
              s = s.replace(marker, marker + rule + '\n', 1)
              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patched index
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply login button style patch [skip ci]"
          git push
