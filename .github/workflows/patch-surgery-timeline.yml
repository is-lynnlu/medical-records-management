name: Patch Surgery Timeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    if: ${{ !contains(github.event.head_commit.message, 'Apply surgery timeline patch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          surgery_period = "{start:'2024-04-11',end:'2024-04-11',label:'2024-04-11',kind:'手术',name:'胰体尾+脾切除术',note:''},\n"
          if surgery_period not in s:
              s = s.replace("const THERAPY_PERIODS=[\n", "const THERAPY_PERIODS=[\n" + surgery_period, 1)
          surgery_fn = "function surgeryPlanItems(){return ['胰体尾+脾切除术。回报病理：（体尾）胰腺中-低分化腺癌，肿瘤大小5*4*3cm，癌组织侵及胰腺周围脂肪组织，未侵及脾门，见神经侵犯。胰腺断端未见癌。自检胰周淋巴结见转移癌（2/4）。脾门淋巴结未见转移癌（0/4）。脾脏红、白髓分界清，未见著变。（肝脏肿物）肝组织内见中-低分化腺癌，结合病史，考虑为胰腺癌转移。肝断端未见癌。']}\n"
          if surgery_fn not in s:
              marker = "function doseItems(rows,p){"
              s = s.replace(marker, surgery_fn + marker, 1)
          s = s.replace("function doseItems(rows,p){if(/AG/.test(p.name)){", "function doseItems(rows,p){if(p?.kind==='手术')return surgeryPlanItems();if(/AG/.test(p.name)){", 1)
          s = s.replace("function cycleItems(rows,p){if(/AG/.test(p.name)){", "function cycleItems(rows,p){if(p?.kind==='手术')return ['不适用'];if(/AG/.test(p.name)){", 1)
          s = s.replace("function eventItems(rows,p){if(p?.start==='2026-04-29')return currentOralEvents();", "function eventItems(rows,p){if(p?.kind==='手术')return ['2024-04-20：乳糜漏；处理：调整饮食'];if(p?.start==='2026-04-29')return currentOralEvents();", 1)
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patched index
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Apply surgery timeline patch [skip ci]"
          git push
